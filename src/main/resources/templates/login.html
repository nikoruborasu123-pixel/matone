<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
</head>
<body>
<h1>ログイン</h1>

<form action="/login" method="post">

    <p>ユーザー名</p>
    <input type="text" name="username">

    <p>パスワード</p>
    <input type="password" name="password">

    <br><br>

    <button type="submit">
        ログイン
    </button>

    <br>

    <p>
        アカウントをお持ちでない方は
        <a href="/register">新規登録はこちら</a>
    </p>

</form>
</body>
</html>
